name: Auto Rule Generation

on:
  workflow_dispatch:
  schedule:
    # GitHub low-traffic hours (UTC 00:00~06:00), non-full-hour Beijing time
    # 04:17 UTC = 12:17 Beijing Time (UTC+8)
    - cron: "17 4 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - name: Setup Python 3.8
        uses: actions/setup-python@v4
        with:
          python-version: 3.8
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests lxml pyyaml
      - name: Generate all rule lists (concurrent)
        run: |
          python scripts/GenerateAll.py
      - uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Auto update rule lists\n\nchore: 自动更新规则列表"
